<header class="dxc-top-navbar">
  <div class="app-title-area">
    <h1 class="main-title m-0">GDR System</h1>
  </div>

  <div class="user-profile">

    <div class="notification-icon" [title]="'navbar.notifications' | translate">
      <i class="fa fa-bell"></i>
      <span class="badge"></span>
    </div>

    <div class="avatar">
      <i class="fa fa-user"></i>
    </div>

    <div class="user-menu">
      <div class="user-info">
        <span class="greeting">
          {{ 'navbar.hello' | translate }} {{ user?.username || user?.email || ('navbar.user' | translate) }}
        </span>
      </div>

      <div class="logout-btn" (click)="logout()" [title]="'navbar.logout' | translate">
        <i class="bi bi-box-arrow-right"></i>
      </div>
    </div>

  </div>
</header>

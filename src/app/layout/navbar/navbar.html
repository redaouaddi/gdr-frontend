<header class="dxc-top-navbar">
  <div class="logo-area">
    <span class="logo-text">DXC</span>
    <span class="logo-sub">IMPOSSIBLE DELIVERED</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/dashboard/admin" routerLinkActive="active" class="nav-item">
      <i class="bi bi-grid"></i> Tableau de bord
    </a>
    <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
      <i class="bi bi-person"></i> Utilisateurs
    </a>
    <a routerLink="/admin/roles" routerLinkActive="active" class="nav-item">
      <i class="bi bi-shield-lock"></i> Rôles
    </a>
    <a routerLink="/admin/settings" routerLinkActive="active" class="nav-item">
      <i class="bi bi-gear"></i> Paramètres
    </a>
  </nav>

  <div class="user-profile">

    <div class="notification-icon" title="Notifications">
      <i class="fa fa-bell"></i>
      <span class="badge"></span>
    </div>

    <!-- Direct Logout Button for Admin -->
    <div class="direct-logout" (click)="logout()" title="Déconnexion">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>

    <div class="avatar" (click)="toggleMenu()">
      <i class="fa fa-user"></i>
    </div>

  <div class="user-menu" [class.open]="menuOpen" (click)="toggleMenu()">
  <span class="greeting">
    Bonjour {{ user?.username }}
  </span>

  <span class="arrow">▼</span>
</div>

<div class="dropdown-menu-test" *ngIf="menuOpen">
  <button type="button" (click)="logout()">Déconnexion</button>
</div>

</div>
 
</header>

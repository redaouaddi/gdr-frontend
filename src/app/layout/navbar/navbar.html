<header class="dxc-top-navbar">
  <div class="logo-area">
    <span class="logo-text">DXC</span>
    <span class="logo-sub">IMPOSSIBLE DELIVERED</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/dashboard/admin" routerLinkActive="active" class="nav-item">
      <i class="bi bi-grid"></i> Tableau de bord
    </a>
    <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
      <i class="bi bi-person"></i> Utilisateurs
    </a>
    <a routerLink="/admin/roles" routerLinkActive="active" class="nav-item">
      <i class="bi bi-shield-lock"></i> Rôles
    </a>
    <a routerLink="/admin/settings" routerLinkActive="active" class="nav-item">
      <i class="bi bi-gear"></i> Paramètres
    </a>
  </nav>

  <div class="user-profile">

  <div class="notification-icon" title="Notifications">
    <i class="fa fa-bell"></i>
    <span class="badge"></span>
  </div>

  <div class="avatar">
    <i class="fa fa-user"></i>
  </div>

  <div class="user-menu">
    <div class="user-info">
      <span class="greeting">
        Bonjour {{ user?.username || user?.email || 'Utilisateur' }}
      </span>
    </div>

    <div class="logout-btn" (click)="logout()" title="Déconnexion">
      <i class="bi bi-box-arrow-right"></i>
    </div>
  </div>

</div>



 
</header>

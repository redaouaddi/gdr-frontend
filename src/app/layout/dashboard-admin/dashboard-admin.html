<div class="layout" style="background:#faf5ff; min-height:100vh;">

  <div class="main w-100">

    <app-navbar></app-navbar>

    <div class="dashboard px-4">

      <h2 class="title mb-4">Admin Dashboard</h2>

      <!-- CARDS -->

      <div class="cards">

        <div class="glass-card stat p-4 mb-3">
          <h3>Utilisateurs</h3>
          <p class="number">12</p>
        </div>

        <div class="glass-card stat p-4 mb-3">
          <h3>Réclamations</h3>
          <p class="number">54</p>
        </div>

        <div class="glass-card stat p-4 mb-3">
          <h3>En cours</h3>
          <p class="number">21</p>
        </div>

        <div class="glass-card stat p-4 mb-3">
          <h3>SLA respecté</h3>
          <p class="number">92%</p>
        </div>

      </div>

      <!-- GRAPH -->

      <div class="glass-card chart p-4 mb-3">

        <h3>Statut des réclamations</h3>

        <canvas id="claimsChart"></canvas>

      </div>

      <!-- TABLE -->

      <div class="glass-card table p-4 mb-3">

        <h3>Activité récente</h3>

        <table class="dxc-table mt-3">

          <tr>
            <th>ID</th>
            <th>Utilisateur</th>
            <th>Action</th>
          </tr>

          <tr>
            <td>1</td>
            <td>admin</td>
            <td>Création utilisateur</td>
          </tr>

          <tr>
            <td>2</td>
            <td>agent1</td>
            <td>Nouvelle réclamation</td>
          </tr>

        </table>

      </div>

    </div>

  </div>

</div>

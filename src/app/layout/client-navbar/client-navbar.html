<header class="client-navbar">
  <div class="app-title-area">
    <h1 class="main-title m-0">GDR System</h1>
  </div>

  <div class="user-area">
    <div class="notification-bell" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bell-dot"></span>
    </div>

    

    <div class="user-profile" (click)="toggleMenu()">
      <div class="avatar-circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="user-greeting">
        <span class="greet-label">Bonjour,</span>
        <span class="greet-name">{{ user?.username || user?.email || '[Nom Client]' }} </span>
      </div>
    </div>
    <div class="logout-btn" (click)="logout()" title="Déconnexion">
      <i class="bi bi-box-arrow-right"></i>
    </div>
  </div>
</header>

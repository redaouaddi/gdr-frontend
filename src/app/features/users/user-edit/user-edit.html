<div class="layout" style="background:#faf5ff; min-height:100vh;">
  
  <div class="main w-100">
    <app-navbar></app-navbar>

    <div class="container-fluid px-5">
      
      <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
        <h2 class="mb-0 fw-semibold" style="color: #4a2769; font-size: 1.8rem;">Modification de l'utilisateur</h2>
      </div>

      <div class="glass-card p-4 mx-auto" style="max-width: 600px;">
        <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-4">
            <label class="form-label fw-semibold text-muted">Nom d'utilisateur</label>
            <input type="text" class="form-control" formControlName="username" style="padding: 12px; border-radius: 8px;">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold text-muted">E-mail</label>
            <input type="email" class="form-control" formControlName="email" style="padding: 12px; border-radius: 8px;">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold text-muted">Rôle</label>
            <select class="form-select" formControlName="role" style="padding: 12px; border-radius: 8px;">
              <option value="ROLE_ADMIN">Admin</option>
              <option value="ROLE_AGENT">Agent</option>
              <option value="ROLE_MANAGER">Manager</option>
              <option value="ROLE_CLIENT">Client</option>
              <option value="ROLE_SERVICE_MANAGER">Service Manager</option>
            </select>
          </div>

          <div *ngIf="errorMessage" class="alert p-3 mb-4 rounded-3 text-danger" style="background: #ffe5e5;">
            <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
          </div>

          <div *ngIf="successMessage" class="alert p-3 mb-4 rounded-3 text-success" style="background: #e2f5ec;">
            <i class="bi bi-check-circle me-2"></i> {{ successMessage }}
          </div>

          <div class="d-flex gap-3 mt-5">
            <button type="submit" class="btn-dxc-primary w-50" [disabled]="userForm.invalid">Enregistrer</button>
            <button type="button" class="btn-dxc-outline w-50" routerLink="/admin/users">Annuler</button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

<div class="d-flex">
  <app-sidebar></app-sidebar>

  <div class="flex-grow-1" style="background:#f5f7fb; min-height:100vh;">
    <app-navbar></app-navbar>

    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Liste des utilisateurs</h2>
        <a routerLink="/admin/users/create" class="btn btn-primary">Ajouter un utilisateur</a>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <table class="table table-bordered table-striped bg-white" *ngIf="users.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Rôles</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.roles.join(', ') }}</td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="users.length === 0 && !errorMessage" class="alert alert-info">
        Aucun utilisateur trouvé.
      </div>
    </div>
  </div>
</div>

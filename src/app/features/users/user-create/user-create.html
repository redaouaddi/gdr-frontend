<div class="d-flex">
  <app-sidebar></app-sidebar>

  <div class="flex-grow-1" style="background:#f5f7fb; min-height:100vh;">
    <app-navbar></app-navbar>

    <div class="container mt-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="mb-4">Ajouter un utilisateur</h2>

          <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nom d'utilisateur</label>
              <input type="text" class="form-control" formControlName="username">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email">
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" formControlName="password">
            </div>

            <div class="mb-3">
              <label class="form-label">Rôle</label>
              <select class="form-select" formControlName="role">
                <option value="ROLE_ADMIN">Admin</option>
                <option value="ROLE_AGENT">Agent</option>
                <option value="ROLE_MANAGER">Manager</option>
                <option value="ROLE_CLIENT">Client</option>
                <option value="ROLE_SERVICE_MANAGER">Service Manager</option>
              </select>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="alert alert-success">
              {{ successMessage }}
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Créer</button>
              <button type="button" class="btn btn-secondary" routerLink="/admin/users">Annuler</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="app-layout">
  <div class="sidebar-container">
    <app-sidebar></app-sidebar>
  </div>
  <div class="main-content" style="background:#f5f7fb; min-height:100vh;">
    <app-navbar></app-navbar>
    <div class="container py-4">
      <div class="user-form-card card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <div class="form-header mb-4">
            <h2 class="form-title mb-1">{{ 'user_create.title' | translate }}</h2>
            <p class="form-subtitle mb-0">
              {{ 'user_create.subtitle' | translate }}
            </p>
          </div>

          <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ 'user_create.first_name' | translate }}</label>
                <input
                  type="text"
                  class="form-control custom-input"
                  formControlName="firstName"
                  [placeholder]="'user_create.first_name_placeholder' | translate"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ 'user_create.last_name' | translate }}</label>
                <input
                  type="text"
                  class="form-control custom-input"
                  formControlName="lastName"
                  [placeholder]="'user_create.last_name_placeholder' | translate"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ 'user_create.email' | translate }}</label>
                <input
                  type="email"
                  class="form-control custom-input"
                  formControlName="email"
                  [placeholder]="'user_create.email_placeholder' | translate"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ 'user_create.password' | translate }}</label>
                <input
                  type="password"
                  class="form-control custom-input"
                  formControlName="password"
                  [placeholder]="'user_create.password_placeholder' | translate"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">{{ 'user_create.gender' | translate }}</label>
                <select class="form-select custom-input" formControlName="gender">
                  <option value="" disabled>{{ 'user_create.select_gender' | translate }}</option>
                  <option value="MASCULIN">{{ 'user_create.gender_options.MASCULIN' | translate }}</option>
                  <option value="FEMININ">{{ 'user_create.gender_options.FEMININ' | translate }}</option>
                </select>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">{{ 'user_create.roles' | translate }}</label>
                <div class="roles-checkbox-group d-flex flex-wrap gap-3 p-3 border rounded-3 bg-white">
                  <div *ngFor="let role of roles" class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      [id]="'role-' + role.id"
                      [checked]="isRoleSelected(role.name)"
                      (change)="onRoleToggle(role.name)"
                    >
                    <label class="form-check-label" [for]="'role-' + role.id">
                      {{ role.name }}
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger mt-4 mb-0">
              {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="alert alert-success mt-4 mb-0">
              {{ successMessage }}
            </div>

            <div class="form-actions d-flex gap-3 mt-4">
              <button type="submit" class="btn btn-create px-4">
                {{ 'user_create.create' | translate }}
              </button>

              <button
                type="button"
                class="btn btn-cancel px-4"
                routerLink="/admin/users"
              >
                {{ 'common.cancel' | translate }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="app-layout">
  <div class="sidebar-container">
    <app-sidebar></app-sidebar>
  </div>
  <div class="main-content" style="background:#f5f7fb; min-height:100vh;">
    <app-navbar></app-navbar>
    <div class="container py-4">
      <div class="user-form-card card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <div class="form-header mb-4">
            <h2 class="form-title mb-1">Ajouter un utilisateur</h2>
            <p class="form-subtitle mb-0">
              Créez un nouveau compte utilisateur et renseignez ses informations.
            </p>
          </div>

          <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Prénom</label>
                <input
                  type="text"
                  class="form-control custom-input"
                  formControlName="firstName"
                  placeholder="Entrez le prénom"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Nom</label>
                <input
                  type="text"
                  class="form-control custom-input"
                  formControlName="lastName"
                  placeholder="Entrez le nom"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input
                  type="email"
                  class="form-control custom-input"
                  formControlName="email"
                  placeholder="Entrez l’adresse email DXC"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Mot de passe</label>
                <input
                  type="password"
                  class="form-control custom-input"
                  formControlName="password"
                  placeholder="Entrez le mot de passe"
                >
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Genre</label>
                <select class="form-select custom-input" formControlName="gender">
                  <option value="" disabled>Choisir un genre</option>
                  <option value="MASCULIN">MASCULIN</option>
                  <option value="FEMININ">FEMININ</option>
                </select>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">Rôles</label>
                <div class="roles-checkbox-group d-flex flex-wrap gap-3 p-3 border rounded-3 bg-white">
                  <div *ngFor="let role of roles" class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      [id]="'role-' + role.id"
                      [checked]="isRoleSelected(role.name)"
                      (change)="onRoleToggle(role.name)"
                    >
                    <label class="form-check-label" [for]="'role-' + role.id">
                      {{ role.name }}
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger mt-4 mb-0">
              {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="alert alert-success mt-4 mb-0">
              {{ successMessage }}
            </div>

            <div class="form-actions d-flex gap-3 mt-4">
              <button type="submit" class="btn btn-create px-4">
                Créer
              </button>

              <button
                type="button"
                class="btn btn-cancel px-4"
                routerLink="/admin/users"
              >
                Annuler
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

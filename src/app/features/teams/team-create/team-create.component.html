<div class="app-layout">
  <div class="sidebar-container">
    <app-sidebar></app-sidebar>
  </div>
  <div class="main-content" style="background:#f5f7fb; min-height:100vh;">
    <app-navbar></app-navbar>

    <div class="container py-4">
      <div class="team-form-card card border-0 shadow-sm mx-auto" style="max-width: 600px; border-radius: 1rem;">
        <div class="card-body p-4 p-md-5">
          <div class="form-header mb-4">
            <h2 class="form-title mb-1 fw-bold" style="color: #4a2769;">Créer une Équipe</h2>
            <p class="form-subtitle mb-0 text-muted">
              Créez une nouvelle équipe en spécifiant l'adresse e-mail du chef d'équipe (Service Manager).
            </p>
          </div>

          <form [formGroup]="teamForm" (ngSubmit)="onSubmit()">
            <div class="row g-4">
              <div class="col-12">
                <label class="form-label fw-semibold">Nom de l'équipe (Service)</label>
                <input
                  type="text"
                  class="form-control custom-input"
                  formControlName="nom"
                  placeholder="Ex: Support IT Niveau 2"
                  style="padding: 12px; border-radius: 8px;"
                >
                <div *ngIf="teamForm.get('nom')?.invalid && teamForm.get('nom')?.touched" class="text-danger mt-1" style="font-size: 0.85rem;">
                  Le nom de l'équipe est requis.
                </div>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold">E-mail du Chef d'équipe</label>
                <select
                  class="form-select custom-input"
                  formControlName="chefEmail"
                  style="padding: 12px; border-radius: 8px;"
                >
                  <option value="" disabled selected>Sélectionnez un chef d'équipe...</option>
                  <option *ngFor="let user of users" [value]="user.email">
                    {{ user.firstName }} {{ user.lastName }} ({{ user.email }})
                  </option>
                </select>
                <div *ngIf="teamForm.get('chefEmail')?.invalid && teamForm.get('chefEmail')?.touched" class="text-danger mt-1" style="font-size: 0.85rem;">
                  Un e-mail valide est requis.
                </div>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger mt-4 mb-0 rounded-3">
               <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="alert alert-success mt-4 mb-0 rounded-3">
               <i class="bi bi-check-circle-fill me-2"></i> {{ successMessage }}
            </div>

            <div class="form-actions d-flex gap-3 mt-5 pt-3 border-top">
              <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="background: #7c3aed; border: none; border-radius: 8px;" [disabled]="teamForm.invalid || isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Créer l'équipe
              </button>

              <button
                type="button"
                class="btn btn-outline-secondary px-4 py-2"
                style="border-radius: 8px;"
                routerLink="/dashboard/admin"
              >
                Annuler
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="login-page">
  <div class="overlay"></div>

  <div class="login-card">
    <div class="logo-box">
      <img src="assets/images/dxc-logo.png" alt="DXC Logo" class="logo" />

      <div class="lang-switcher">
        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'fr'"
          (click)="switchLang('fr')">
          <img src="assets/images/flags/fr.png" class="flag" alt="FR">
          FR
        </button>

        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'en'"
          (click)="switchLang('en')">
          <img src="assets/images/flags/en.png" class="flag" alt="EN">
          EN
        </button>
      </div>

      <p class="subtitle">{{ 'login.subtitle' | translate }}</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <span class="icon">👤</span>
        <input
          type="email"
          [placeholder]="'login.email' | translate"
          formControlName="email" />
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input
          type="password"
          [placeholder]="'login.password' | translate"
          formControlName="password" />
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? ('login.loading' | translate) : ('login.button' | translate) }}
      </button>

      <small *ngIf="loginError" class="auth-error">
        {{ loginError }}
      </small>

      <button
        type="button"
        class="face-login-btn"
        (click)="openFaceLoginModal()">
        🔐 {{ 'login.face_button' | translate }}
      </button>

    </form>
  </div>

  <!-- MODAL FACE LOGIN -->
  <div class="face-modal-backdrop" *ngIf="showFaceLoginModal">
    <div class="face-modal">

      <h5>{{ 'login.face_title' | translate }}</h5>

      <video #faceLoginVideo autoplay playsinline class="face-video"></video>
      <canvas #faceLoginCanvas class="face-canvas"></canvas>

      <div class="face-actions">
        <button type="button" class="face-action-btn" (click)="startFaceLoginCamera()">
          {{ 'login.open_camera' | translate }}
        </button>

        <button type="button" class="face-action-btn" (click)="captureFaceLogin()">
          {{ 'login.capture' | translate }}
        </button>

        <button
          type="button"
          class="face-action-btn"
          (click)="loginWithFace()"
          [disabled]="!faceLoginImage">
          {{ 'login.validate' | translate }}
        </button>

        <button type="button" class="face-action-btn cancel" (click)="closeFaceLoginModal()">
          {{ 'login.close' | translate }}
        </button>
      </div>

      <div *ngIf="faceLoginImage" class="preview-block">
        <p>{{ 'login.preview' | translate }}</p>
        <img [src]="faceLoginImage" class="face-preview" />
      </div>

      <small *ngIf="faceLoginMessage" class="face-success">
        {{ faceLoginMessage }}
      </small>

      <small *ngIf="faceLoginError" class="face-error">
        {{ faceLoginError }}
      </small>

    </div>
  </div>
</div>

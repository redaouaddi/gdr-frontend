<div class="login-page">
  <div class="overlay"></div>

  <div class="login-card">
    <div class="logo-box">
      <img src="assets/images/dxc-logo.png" alt="DXC Logo" class="logo" />

      <div class="lang-switcher">
        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'fr'"
          (click)="switchLang('fr')">
          <img src="assets/images/flags/fr.png" class="flag" alt="FR">
          FR
        </button>

        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'en'"
          (click)="switchLang('en')">
          <img src="assets/images/flags/en.png" class="flag" alt="EN">
          EN
        </button>
      </div>

      <p class="subtitle">{{ 'login.subtitle' | translate }}</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <span class="icon">👤</span>
        <input
          type="email"
          [placeholder]="'login.email' | translate"
          formControlName="email" />
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input
          type="password"
          [placeholder]="'login.password' | translate"
          formControlName="password" />
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? ('login.loading' | translate) : ('login.button' | translate) }}
      </button>

      <small *ngIf="loginError" class="auth-error">
        {{ loginError }}
      </small>

      <button
        type="button"
        class="face-login-btn"
        (click)="openFaceLoginModal()">
        🔐 {{ 'login.face_button' | translate }}
      </button>

    </form>
  </div>
</div>

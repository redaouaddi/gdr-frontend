<div class="login-page">
  <div class="overlay"></div>

  <div class="login-card">
    <div class="logo-box">
      <img src="assets/images/dxc-logo-bl.png" alt="DXC Logo" class="logo" />

      <div class="lang-switcher">
        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'fr'"
          (click)="switchLang('fr')">
          <img src="assets/images/flags/fr.png" class="flag" alt="FR">
          FR
        </button>

        <button
          type="button"
          class="lang-btn"
          [class.active]="currentLang === 'en'"
          (click)="switchLang('en')">
          <img src="assets/images/flags/en.png" class="flag" alt="EN">
          EN
        </button>
      </div>

      <p class="subtitle">{{ 'login.subtitle' | translate }}</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <span class="icon">👤</span>
        <input
          type="email"
          [placeholder]="'login.email' | translate"
          formControlName="email" />
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input
          type="password"
          [placeholder]="'login.password' | translate"
          formControlName="password" />
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? ('login.loading' | translate) : ('login.button' | translate) }}
      </button>

      <small *ngIf="loginError" class="auth-error">
        {{ loginError }}
      </small>

      <button
        type="button"
        class="face-login-btn"
        (click)="openFaceLoginModal()">
        🔐 {{ 'login.face_button' | translate }}
      </button>

    </form>
  </div>

  <!-- MODAL FACE LOGIN -->
  <div class="face-modal-backdrop" *ngIf="showFaceLoginModal">
  <div class="face-modal">
    <h5>{{ 'auth.face_login.title' | translate }}</h5>

    <div class="camera-frame-wrapper">
      <video #faceLoginVideo autoplay playsinline class="face-video"></video>

      <div class="face-guide-overlay">
        <div class="face-guide-oval"></div>
        <p class="face-guide-text">
          {{ 'auth.face_login.guide_text' | translate }}
        </p>
      </div>
    </div>

    <canvas #faceLoginCanvas class="face-canvas"></canvas>

    <div class="face-actions">
      <button class="face-action-btn" (click)="startFaceLoginCamera()">
        {{ 'auth.face_login.open_camera' | translate }}
      </button>

      <button class="face-action-btn" (click)="captureFaceLogin()">
        {{ 'auth.face_login.capture' | translate }}
      </button>

      <button class="face-action-btn" (click)="loginWithFace()" [disabled]="!faceLoginImage">
        {{ 'auth.face_login.validate' | translate }}
      </button>

      <button class="face-action-btn cancel" (click)="closeFaceLoginModal()">
        {{ 'common.close' | translate }}
      </button>
    </div>

    <div *ngIf="faceLoginImage" class="preview-block">
      <p>{{ 'auth.face_login.preview' | translate }}</p>
      <img [src]="faceLoginImage" class="face-preview" />
    </div>

    <small *ngIf="faceLoginMessage" class="face-success">
      {{ faceLoginMessage | translate }}
    </small>

    <small *ngIf="faceLoginError" class="face-error">
      {{ faceLoginError | translate }}
    </small>
  </div>
</div>
</div>

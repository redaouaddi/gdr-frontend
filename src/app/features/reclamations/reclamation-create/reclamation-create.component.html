<div class="reclamation-dashboard">
  <!-- Reusing the client navbar -->
  <app-client-navbar></app-client-navbar>

  <div class="main-content">
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">Créer une Réclamation</h1>
        <p class="form-subtitle">Décrivez votre problème afin qu'un de nos agents puisse vous aider.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #recForm="ngForm">
        
        <div class="form-group">
          <label for="titre">Objet (Titre) <span class="required">*</span></label>
          <input type="text" id="titre" name="titre" [(ngModel)]="reclamation.titre" required placeholder="Ex: Problème de connexion" class="form-control">
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label for="categorie">Type (Catégorie)</label>
            <select id="categorie" name="categorie" [(ngModel)]="reclamation.categorie" class="form-control">
              <option value="TECHNIQUE">Technique</option>
              <option value="FACTURATION">Facturation</option>
              <option value="SERVICE">Service</option>
              <option value="AUTRE">Autre</option>
            </select>
          </div>

          <div class="form-group half">
            <label for="priorite">Priorité</label>
            <select id="priorite" name="priorite" [(ngModel)]="reclamation.priorite" class="form-control">
              <option value="FAIBLE">Faible</option>
              <option value="MOYENNE">Moyenne</option>
              <option value="ELEVEE">Élevée</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description <span class="required">*</span></label>
          <textarea id="description" name="description" [(ngModel)]="reclamation.description" required rows="5" placeholder="Décrivez votre problème en détail..." class="form-control"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>
          <button type="submit" class="btn-submit" [disabled]="isSubmitting || !recForm.form.valid">
            <span *ngIf="isSubmitting">Création...</span>
            <span *ngIf="!isSubmitting">Soumettre</span>
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Success Overlay Modal -->
  <div class="success-overlay" *ngIf="showSuccess">
    <div class="success-modal">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2 class="success-title">Réclamation Créée !</h2>
      <p class="success-text">Votre réclamation a été enregistrée avec succès.</p>
      <div class="redirect-info">
        Redirection vers la liste dans <span class="countdown">{{ countdown }}</span> s...
      </div>
    </div>
  </div>
</div>

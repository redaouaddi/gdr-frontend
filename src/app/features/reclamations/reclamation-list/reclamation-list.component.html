<div class="app-layout">
  <div class="sidebar-container">
    <app-sidebar></app-sidebar>
  </div>
  <div class="main-content">
    <div class="reclamation-dashboard">
      <!-- Top Gradient Navbar -->
      <app-client-navbar></app-client-navbar>

  <!-- Main content area matching the mockup -->
  <div class="main-content">
    <div class="header-section">
      <h1 class="page-title">Vos Réclamations</h1>
    </div>

    <div class="table-card">
      <table class="reclamation-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Objet</th>
            <th>Type</th>
            <th>État</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let rec of reclamations">
            <td class="col-id">{{ rec.numeroReclamation }}</td>
            <td class="col-objet">{{ rec.titre }}</td>
            <td class="col-type">{{ rec.categorie }}</td>
            <td class="col-etat">
              <span [ngClass]="getStatusClass(rec.statut)">{{ rec.statut }}</span>
            </td>
          </tr>
          
          <tr *ngIf="reclamations.length === 0">
            <td colspan="4" style="text-align: center; padding: 40px; color: #8b8e9d;">
              Aucune réclamation trouvée.
            </td>
          </tr>
          <!-- Render empty rows to fill height as in mockup if list is short -->
          <ng-container *ngIf="reclamations.length < 6">
            <tr *ngFor="let i of [1,2,3]" class="empty-row">
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </ng-container>
        </tbody>
      </table>

      <div class="create-btn-container">
        <button class="btn-create-reclamation" (click)="onCreateReclamation()">
          <span class="btn-icon">&#8594;</span>
          <span class="btn-text">Créer une Réclamation</span>
        </button>
      </div>
    </div>
  </div>
    </div>
  </div>
</div>

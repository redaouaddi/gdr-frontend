<div class="app-layout">
  <div class="sidebar-container">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-content">
    <app-navbar></app-navbar>

    <div class="messages-page px-4">
      <h2 class="page-title">
        {{ 'internal_messages.title' | translate }}
      </h2>

      <div class="glass-card select-card p-4 mb-3">
        <label class="form-label">
          {{ 'internal_messages.select_claim' | translate }}
        </label>

        <select
          class="form-select"
          [(ngModel)]="selectedReclamationId"
          (change)="onReclamationChange()"
        >
          <option [ngValue]="null">
            {{ 'internal_messages.choose_claim' | translate }}
          </option>

          <option
            *ngFor="let reclamation of reclamations"
            [ngValue]="reclamation.id"
          >
            {{ reclamation.numeroReclamation }} - {{ reclamation.titre }}
          </option>
        </select>
      </div>

      <div class="glass-card chat-container p-4">
        <div class="chat-header">
          <h3>{{ 'internal_messages.discussion' | translate }}</h3>
        </div>

        <div class="chat-messages">
          <ng-container *ngIf="messages.length > 0; else emptyMessages">
            <div
              class="message-row"
              *ngFor="let message of messages; trackBy: trackByMessageId"
              [class.my-message]="isMyMessage(message)"
            >
              <div class="message-bubble">
                <div class="message-top">
                  <span class="message-author">{{ message.auteurNom }}</span>
                  <span class="message-date">{{ message.dateEnvoi | date:'dd/MM/yyyy HH:mm' }}</span>
                </div>

                <div class="message-text">
                  {{ message.contenu }}
                </div>
              </div>
            </div>
          </ng-container>

          <ng-template #emptyMessages>
            <div class="empty-state">
              {{ 'internal_messages.no_messages' | translate }}
            </div>
          </ng-template>
        </div>

        <div class="chat-input">
          <textarea
            class="form-control"
            rows="4"
            [(ngModel)]="nouveauMessage"
            [placeholder]="'internal_messages.placeholder' | translate"
          ></textarea>

          <div class="chat-actions">
            <button
              class="btn btn-primary send-btn"
              (click)="envoyerMessage()"
              [disabled]="isSending"
            >
              {{ 'internal_messages.send' | translate }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
